<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Try-On Approved Baseline v1.0.0</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, sans-serif; }
    body { margin: 0; padding: 24px; background: #f5f5f4; color: #1c1917; }
    .approved { padding: 12px 16px; color: #14532d; background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px; }
    .case { margin: 24px 0; padding: 18px; background: white; border: 1px solid #d6d3d1; border-radius: 12px; }
    .images { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    figure { margin: 0; }
    img { display: block; width: 100%; height: 420px; object-fit: contain; background: #fafaf9; }
    figcaption { margin-top: 8px; font-weight: 600; }
    @media (max-width: 800px) { .images { grid-template-columns: 1fr; } img { height: auto; max-height: 520px; } }
  </style>
</head>
<body>
  <h1>Try-On Approved Baseline v1.0.0</h1>
  <p class="approved">Reviewer sihanchen 已於 2026-07-18 核准以下 7 個 regression references。</p>
  <div id="cases"></div>
  <script>
    const cases = [
      ["v16-m01-g01-s10101", "inputs/models/model-01.jpeg", "inputs/garments/garment-01-mint-sweatshirt.jpg"],
      ["v16-m01-g02-s10102", "inputs/models/model-01.jpeg", "inputs/garments/garment-02-blue-tee.jpg"],
      ["v16-m01-g03-s10103", "inputs/models/model-01.jpeg", "inputs/garments/garment-03-gray-tee.jpg"],
      ["v16-m02-g01-s20101", "inputs/models/model-02.jpg", "inputs/garments/garment-01-mint-sweatshirt.jpg"],
      ["v16-m02-g04-s20104", "inputs/models/model-02.jpg", "inputs/garments/garment-04-orange-tee.jpg"],
      ["v16-m01-g02-s30102", "inputs/models/model-01.jpeg", "inputs/garments/garment-02-blue-tee.jpg"],
      ["v16-m01-g03-s30103", "inputs/models/model-01.jpeg", "inputs/garments/garment-03-gray-tee.jpg"]
    ];
    const root = document.querySelector("#cases");
    for (const [id, person, garment] of cases) {
      const section = document.createElement("section");
      section.className = "case";
      section.innerHTML = `<h2>${id}</h2><div class="images">
        <figure><img src="${person}" alt="${id} 人物輸入"><figcaption>人物輸入</figcaption></figure>
        <figure><img src="${garment}" alt="${id} 服裝輸入"><figcaption>服裝輸入</figcaption></figure>
        <figure><img src="results/${id}.jpg" alt="${id} approved 結果"><figcaption>Approved FASHN result</figcaption></figure>
      </div>`;
      root.append(section);
    }
  </script>
</body>
</html>
