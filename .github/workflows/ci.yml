name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run deterministic Try-On cases
        run: npm run try-on:cases -- --json

      - name: Run lint
        run: npm run lint
